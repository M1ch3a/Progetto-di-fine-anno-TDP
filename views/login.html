<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Autenticazione</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🔐 Accesso</h1>
            
            <div id="error-message" class="error-message hidden"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-login">Accedi</button>
            </form>
            
            <div class="info-note">
                <p>Credenziali di test:</p>
                <ul>
                    <li>mario.rossi / password123</li>
                    <li>luca.verdi / mypass</li>
                    <li>admin / 1234</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Nascondi eventuali errori precedenti
            errorDiv.classList.add('hidden');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Login riuscito - reindirizza alla dashboard
                    window.location.href = '/dashboard';
                } else {
                    // Mostra errore
                    errorDiv.textContent = data.message || 'Errore durante il login';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Errore di connessione al server';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
